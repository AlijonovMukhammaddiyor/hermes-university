# ── Daily Tech Briefing — source list (RFC-010) ──────────────────────────────
# Edit freely: add/remove sources. The briefer tries `rss`/`api` first (reliable), else fetches `url`
# or web-searches the site. `paid: true` = titles/teasers only (no full text). `weight: high` = always
# scanned; the rest fill the long tail. RSS URLs are best-effort — the briefer falls back if one 404s.

categories:
  - name: "AI labs & research"
    sources:
      - { title: "Anthropic", url: "https://www.anthropic.com/news", weight: high }
      - { title: "OpenAI", url: "https://openai.com/news/", weight: high }
      - { title: "Google DeepMind", url: "https://deepmind.google/blog/", weight: high }
      - { title: "Google Research", url: "https://research.google/blog/" }
      - { title: "Meta AI", url: "https://ai.meta.com/blog/" }
      - { title: "Hugging Face", url: "https://huggingface.co/blog", rss: "https://huggingface.co/blog/feed.xml" }
      - { title: "Mistral AI", url: "https://mistral.ai/news/" }

  - name: "AI engineering & practitioners"
    sources:
      - { title: "Simon Willison", url: "https://simonwillison.net/", rss: "https://simonwillison.net/atom/everything/", weight: high }
      - { title: "Ahead of AI — Sebastian Raschka", url: "https://magazine.sebastianraschka.com/" }
      - { title: "Lil'Log — Lilian Weng", url: "https://lilianweng.github.io/", rss: "https://lilianweng.github.io/index.xml" }
      - { title: "Chip Huyen", url: "https://huyenchip.com/blog/", rss: "https://huyenchip.com/feed.xml" }
      - { title: "Eugene Yan", url: "https://eugeneyan.com/", rss: "https://eugeneyan.com/rss/" }
      - { title: "Hamel Husain", url: "https://hamel.dev/", rss: "https://hamel.dev/index.xml" }
      - { title: "Latent Space", url: "https://www.latent.space/", weight: high }
      - { title: "Interconnects — Nathan Lambert", url: "https://www.interconnects.ai/" }
      - { title: "Import AI — Jack Clark", url: "https://importai.substack.com/" }
      - { title: "The Batch — DeepLearning.AI", url: "https://www.deeplearning.ai/the-batch/" }

  - name: "Systems, backend & engineering craft"
    sources:
      - { title: "The Pragmatic Engineer — Gergely Orosz", url: "https://newsletter.pragmaticengineer.com/", paid: true, weight: high }
      - { title: "ByteByteGo — Alex Xu", url: "https://blog.bytebytego.com/" }
      - { title: "Martin Kleppmann", url: "https://martin.kleppmann.com/", rss: "https://martin.kleppmann.com/feed.xml" }
      - { title: "Dan Luu", url: "https://danluu.com/", rss: "https://danluu.com/atom.xml" }
      - { title: "Julia Evans — b0rk", url: "https://jvns.ca/", rss: "https://jvns.ca/atom.xml" }
      - { title: "Marc Brooker", url: "https://brooker.co.za/blog/", rss: "https://brooker.co.za/blog/rss.xml" }
      - { title: "Brendan Gregg", url: "https://www.brendangregg.com/blog/", rss: "https://www.brendangregg.com/blog/rss.xml" }
      - { title: "InfoQ", url: "https://www.infoq.com/" }
      - { title: "The New Stack", url: "https://thenewstack.io/", rss: "https://thenewstack.io/feed/" }

  - name: "Product, career & strategy"
    sources:
      - { title: "Lenny's Newsletter", url: "https://www.lennysnewsletter.com/", paid: true }
      - { title: "Stratechery — Ben Thompson", url: "https://stratechery.com/", paid: true }

  - name: "Security"
    sources:
      - { title: "Krebs on Security", url: "https://krebsonsecurity.com/", rss: "https://krebsonsecurity.com/feed/" }
      - { title: "tl;dr sec", url: "https://tldrsec.com/" }

  # Developer newsletters & curated digests (via rockstardeveloperuniversity.com/best-developer-newsletters)
  - name: "Developer newsletters & digests"
    sources:
      - { title: "JavaScript Weekly", url: "https://javascriptweekly.com/", rss: "https://javascriptweekly.com/rss" }
      - { title: "StatusCode Weekly — backend/devops", url: "https://weekly.statuscode.com/" }
      - { title: "The Developing Dev — Ryan Peterman (career)", url: "https://www.developing.dev/", rss: "https://www.developing.dev/feed" }
      - { title: "Tech World with Milan — architecture", url: "https://newsletter.techworld-with-milan.com/", rss: "https://newsletter.techworld-with-milan.com/feed" }
      - { title: "Pointer — curated engineering essays", url: "https://www.pointer.io/" }
      - { title: "Programming Digest", url: "https://programmingdigest.net/" }
      - { title: "rendezvous with cassidoo — web + challenges", url: "https://cassidoo.co/newsletter/", rss: "https://cassidoo.co/rss.xml" }
      - { title: "The Engineering Manager", url: "https://www.theengineeringmanager.com/" }

# Aggregators — scanned every day for the day's biggest stories.
aggregators:
  - { title: "Hacker News (front page)", api: "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=30", weight: high }
  - { title: "TLDR newsletter", url: "https://tldr.tech/", weight: high }
  - { title: "Lobsters", url: "https://lobste.rs/", rss: "https://lobste.rs/rss" }
  - { title: "Changelog", url: "https://changelog.com/news", rss: "https://changelog.com/news/feed" }
